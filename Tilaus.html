<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tilaus - ROAST</title>
  <link rel="stylesheet" href="Roast.css">
  <script src="kassa.js" defer></script>
  <script src="index.js" defer></script>
</head>
<body class="cart-page-roast">

<nav class="navbar">
  <div class="logo"><a href="Roast.html">ROAST</a></div>
  <ul class="nav-links">
    <li><a href="Roast.html">Etusivu</a></li>
    <li><a href="Menu.html">Menu</a></li>
    <li><a href="login.html" class="btn-login" id="main-auth-btn">Kirjaudu</a></li>
  </ul>
</nav>

<main class="checkout-container">
  <div class="checkout-layout">

    <section class="checkout-form-section">
      <div class="roast-card">
        <h2>1. Toimitustiedot</h2>
        <form id="order-form">
          <div class="form-group">
            <label for="customer-name">Nimi</label>
            <input type="text" id="customer-name" placeholder="Matti Meikäläinen">
          </div>
          <div class="form-group">
            <label for="customer-phone">Puhelinnumero</label>
            <input type="text" id="customer-phone" placeholder="040 123 4567">
          </div>

          <h3>Valitse toimitustapa</h3>
          <div class="method-selector-grid">
            <label class="method-option">
              <input type="radio" name="delivery" value="0.00" checked onchange="laskeLoppusumma()">
              <div class="method-box">
                <strong>Nouto</strong><br>
                <span>0,00 €</span>
              </div>
            </label>
            <label class="method-option">
              <input type="radio" name="delivery" value="4.90" onchange="laskeLoppusumma()">
              <div class="method-box">
                <strong>Kuljetus</strong><br>
                <span>4,90 €</span>
              </div>
            </label>
          </div>

          <h3>2. Valitse maksutapa</h3>
          <div class="method-selector-grid">
            <label class="method-option">
              <input type="radio" name="payment" value="Kortti" checked>
              <div class="method-box">
                <strong>Kortti</strong>
              </div>
            </label>
            <label class="method-option">
              <input type="radio" name="payment" value="MobilePay">
              <div class="method-box">
                <strong>MobilePay</strong>
              </div>
            </label>
            <label class="method-option">
              <input type="radio" name="payment" value="Käteinen">
              <div class="method-box">
                <strong>Käteinen</strong>
              </div>
            </label>
          </div>
        </form>
      </div>
    </section>

    <aside class="checkout-summary-section">
      <div class="summary-card-v2">
        <h3>Tilauksen yhteenveto</h3>

        <div class="summary-row">
          <span>Ostoskorin välisumma</span>
          <span id="cart-subtotal">0.00 €</span>
        </div>

        <div class="summary-row">
          <span>Toimitus</span>
          <span id="delivery-cost">0.00 €</span>
        </div>

        <hr class="summary-divider">

        <div class="summary-row total-highlight">
          <strong>Yhteensä verollinen</strong>
          <strong id="final-total">0.00 €</strong>
        </div>

        <div class="summary-row info-small">
          <span>Yhteensä veroton</span>
          <span id="taxless-total">0.00 €</span>
        </div>

        <div class="summary-row info-small">
          <span>Vero (14%)</span>
          <span id="tax-amount">0.00 €</span>
        </div>

        <button class="btn-primary full-width-btn" onclick="lahetaTilaus()">
          VAHVISTA TILAUS
        </button>
      </div>
    </aside>

  </div>
</main>

</body>
</html>
