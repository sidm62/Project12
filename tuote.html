<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Roast.css">
    <script src ="tuote.js" defer></script>
    <script src="index.js" defer></script>
    <title>Tuotesivu - Roast Burger</title>
</head>
<body class="product-detail-body">

<div class="product-page-container">

    <div class="product-left">
        <h1 id="tuote-nimi">Ladataan...</h1>
        <div class="product-image-box">
            <img id="tuote-kuva" src="" alt="Tuotekuva">
        </div>
        <button class="btn-yellow-alt">Esitä kysymys tästä tuotteesta</button>
    </div>

    <div class="product-right">

        <div class="star-box">
            <div class="star-box-header">Hinta</div>
            <div class="star-box-content">
                <div id="tuote-hinta" style="font-size: 1.8rem; font-weight: 800;">0.00€</div>
            </div>
        </div>

        <div class="star-box">
            <div class="star-box-header">Valitse Juoma</div>
            <div class="star-box-content">
                <select id="drink-select" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="Ei juomaa">-- Valitse juoma --</option>
                    <option value="Coca-Cola 0,33L">Coca-Cola 0,33L</option>
                    <option value="Fanta 0,33L">Fanta 0,33L</option>
                    <option value="Bonaqua 0,33L">Bonaqua 0,33L</option>
                </select>
            </div>
        </div>

        <div class="star-box">
            <div class="star-box-header">Lisätiedot ja allergiat</div>
            <div class="star-box-content">
                <textarea id="lisatiedot" placeholder="Esim. ei sipulia, lisukkeet erikseen..." style="width: 100%; height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
            </div>
        </div>

        <div class="quantity-section" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <strong style="color: #333;">Määrä:</strong>
            <button onclick="muutaMaara(-1)" style="width: 35px; height: 35px; cursor: pointer;">-</button>
            <input type="number" id="maara" value="1" min="1" readonly style="width: 50px; text-align: center; font-weight: bold; border: none; background: transparent; font-size: 1.1rem;">
            <button onclick="muutaMaara(1)" style="width: 35px; height: 35px; cursor: pointer;">+</button>
        </div>

        <button class="btn-add-to-cart" onclick="lisaaMuokattuTuote()" style="width: 100%; padding: 18px; cursor: pointer;">
            LISÄÄ OSTOSKORIIN
        </button>

    </div>
</div>
</body>
</html>
