<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAST - Oma Profiili</title>
    <link rel="stylesheet" href="Roast.css">
    <script src="profile.js" defer></script>
    <script src="index.js" defer></script>
</head>
<body>

<nav class="navbar">
    <div class="logo"><a href="Roast.html" style="color:inherit; text-decoration:none;">ROAST</a></div>
    <ul class="nav-links">
        <li><a href="Roast.html">Etusivu</a></li>
        <li><a href="About.html">Meistä</a></li>
        <li><a href="Kassa.html" class="btn-kassa">Ostoskori</a></li>
        <li><a href="Register.html" id="registerLink">Rekisteröidy</a></li>
        <li><a href="login.html" class="btn-login" id="main-auth-btn">Kirjaudu</a></li>


    </ul>
</nav>

<main class="auth-container">
    <section class="login-card profile-card">
        <h1>Oma Profiili</h1>

        <div class="profile-info">
            <div class="info-group">
                <label>Käyttäjänimi:</label>
                <h2 id="username">Ladataan...</h2>
            </div>

            <div class="info-group">
                <label>Sähköposti:</label>
                <p id="email"></p>
            </div>

            <div class="info-group">
                <label>Rooli:</label>
                <p id="role" class="badge">-</p>
            </div>
        </div>

        <div class="profile-actions">
            <button onclick="window.location.href='Tilaus.html'" class="btn-secondary">Tilaushistoria</button>
            <button onclick="changePassword()" class="btn-secondary">Vaihda salasana</button>
            <button onclick="logout()" class="btn-login logout-red">Kirjaudu ulos</button>
        </div>
    </section>
</main>

</body>
</html>
