<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAST - Menu</title>
    <link rel="stylesheet" href="Roast.css">
    <script src="index.js" defer></script>
</head>
<body>

<nav class="navbar">
    <div class="logo"><a href="Roast.html" style="color:inherit; text-decoration:none;">ROAST</a></div>
    <ul class="nav-links">
        <li><a href="Roast.html">Etusivu</a></li>
        <li><a href="About.html">Meistä</a></li>
        <li><a href="Kassa.html" class="btn-kassa">Ostoskori</a></li>
        <li><a href="register.html" id="registerLink">Rekisteröidy</a></li>
        <li><a href="login.html" class="btn-login" id="main-auth-btn">Kirjaudu</a></li>
    </ul>
</nav>

<div class="menu-container-layout">

    <nav class="category-nav-sticky">
        <ul class="category-list-horizontal">
            <li class="active" onclick="scrollToCategory('cat-burger')">BURGERIT</li>
            <li onclick="scrollToCategory('cat-main')">PÄÄRUOAT</li>
            <li onclick="scrollToCategory('cat-side')">LISUKKEET</li>
            <li onclick="scrollToCategory('cat-drink')">JUOMAT</li>
            <li onclick="scrollToCategory('cat-dessert')">JÄLKIRUOAT</li>
        </ul>
    </nav>

    <section class="menu-content-full">
        <div class="product-grid-container" id="ruokalista">
            </div>
    </section>

</div>

<div id="cart-status" class="cart-summary">
    <span>Kori: <span id="cart-count">0</span> tuotetta</span>
    <a href="Kassa.html" class="btn-small">Kassalle</a>
</div>

<div id="menuModal" class="modal">
    <div class="modal-content">
        <div id="modal-icon" style="font-size: 3rem; margin-bottom: 15px;">🛒</div>
        <h2 id="modal-title">Lisätäänkö koriin?</h2>
        <p id="modal-text">Haluatko lisätä tuotteen ostoskoriin?</p>

        <div class="modal-buttons" id="modal-footer">
        </div>
    </div>
</div>

</html>
