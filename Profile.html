<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAST - Oma Profiili</title>
    <link rel="stylesheet" href="Roast.css">
    <script src="profile.js" defer></script>
    <script src="index.js" defer></script>
</head>
<body>

<nav class="navbar">
    <div class="logo"><a href="Roast.html" style="color:inherit; text-decoration:none;">ROAST</a></div>
    <ul class="nav-links">
        <li><a href="Roast.html">Etusivu</a></li>
        <li><a href="About.html">Meistä</a></li>
        <li><a href="Kassa.html" class="btn-kassa">Ostoskori</a></li>
        <li><a href="register.html" id="registerLink">Rekisteröidy</a></li>
        <li><a href="login.html" class="btn-login" id="main-auth-btn">Kirjaudu</a></li>


    </ul>
</nav>

<main class="auth-container">
    <section class="login-card profile-card">
        <h1>Oma Profiili</h1>

        <div class="profile-info">
            <div class="info-group">
                <label>Käyttäjänimi:</label>
                <h2 id="username">Ladataan...</h2>
            </div>

            <div class="info-group">
                <label>Sähköposti:</label>
                <p id="email"></p>
            </div>

            <div class="info-group">
                <label>Rooli:</label>
                <p id="role" class="badge">-</p>
            </div>
        </div>

        <div class="profile-actions">

            <div id="history-container">
            </div>

            <div id="password-change-section" style="display:none;">
                <div class="form-group">
                    <label for="password">Uusi salasana</label>
                    <input type="password" id="password" name="password" class="password-input">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Vahvista salasana</label>
                    <input type="password" id="confirm-password" name="confirm-password" class="password-input">
                </div>
                <button onclick="savePassword()" class="btn-login">Tallenna uusi salasana</button>
            </div>

            <button id="toggle-pw-btn" onclick="changePassword()" class="btn-login">Vaihda salasana</button>

        </div>

            <button onclick="logout()" class="btn-login logout-red">Kirjaudu ulos</button>

    </section>
</main>
<div id="menuModal" class="modal" style="display: none">
    <div class="modal-content">
        <div id="modal-icon"></div>
        <h2 id="modal-title"></h2>
        <p id="modal-text"></p>
        <div id="modal-footer" class="modal-footer">
    </div>
</div>

</body>
</html>
